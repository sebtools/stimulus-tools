<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Faker Controller Example</title>
	<link rel="stylesheet" type="text/css" href="../theme.css">
</head>
<body>

	<h1>Faker Controller</h1>

	<p>This is a demo of the Faker controller being used with the TableSort controller.</p>

	<!--
	<p>Click the button below to generate fake data.</p>
	<button data-action="faker#generate">Generate</button>
	-->

	<table data-controller="faker tablesort">
		<colgroup>
			<col span="1" style="width: 50%;">
			<col span="1" style="width: 50%;">
		</colgroup>
		<thead>
			<tr>
				<th>Name</th>
				<th>Email</th>
				<th>Number</th>
			</tr>
		</thead>
		<tbody>
			<tr data-faker-records="50">
				<td data-faker-html="person.fullName"></td>
				<td data-faker-html="internet.email"></td>
				<td data-faker-html="number.bigInt:max=5000&min=1000"></td>
			</tr>
		</tbody>
	</table>

<script src="../js/stimulus.js"></script>
<script src="../js/app.js"></script>
<script src="js/controllers/faker_controller.js" type="module"></script>
<script src="../tablesort/js/controllers/tablesort_controller.js" type="module"></script>

</body>
</html>
