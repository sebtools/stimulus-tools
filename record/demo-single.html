<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Record — Single Form Demo</title>
	<link rel="stylesheet" href="../theme.css">
	<link rel="stylesheet" href="common.css">
</head>
<body>

	<h1>Record — Single Form Demo</h1>

	<p>A minimal demo that shows a single editable record (one table) using the <code>record</code> controller.
	The page also includes an <code>eventlog</code> so you can see the events the controller emits. No extra JavaScript is required.</p>

	<div style="display:flex; gap:24px; align-items:flex-start;">

		<div style="flex:1; min-width:320px;">
			<h2>Record Editor</h2>

			<!-- Controller: a single table scope with one editable record -->
			<div
				data-controller="record"
				data-record-table="people"
				data-record-id="person_1"
				style="display:grid; gap:8px;"
			>
				<label>Name
					<input type="text" name="name" data-record-field="name" value="Alice" />
				</label>

				<label>Email
					<input type="email" name="email" data-record-field="email" value="alice@example.org" />
				</label>

				<label>Notes
					<textarea name="notes" data-record-field="notes">Initial notes</textarea>
				</label>

				<div style="display:flex; gap:8px;">
					<!-- Save button triggers the controller's save action (will dispatch update/add events) -->
					<button type="button" data-action="record#saveRecord">Save</button>
				</div>

			</div>
		</div>

		<div style="width:380px;">
			<h2>Event Log</h2>
			<!-- EventLog listens for a set of record-related events and prints them -->
			<div
				data-controller="eventlog"
				data-eventlog-events="record:ui:added record:ui:added record:ui:add record:ui:update record:ui:updated record:ui:delete record:ui:deleted record:ui:dirty record:ui:loaded"
				data-eventlog-serialize-dom="element"
				style="min-height:240px; background:white; border:1px solid #e0e0e0; padding:10px; overflow:auto;">
			</div>
		</div>

	</div>

	<!-- Load Stimulus and the app bootstrap -->
	<script src="../js/stimulus.js"></script>
	<script src="../js/app.js"></script>

	<!-- Load controllers used on this page -->
	<script type="module" src="js/controllers/record_controller.js"></script>
	<script type="module" src="../eventlog/js/controllers/eventlog_controller.js"></script>

</body>
</html>
