<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Record — Table-level Autoload Demo</title>
	<link rel="stylesheet" href="../theme.css">
	<link rel="stylesheet" href="common.css">
</head>
<body>

	<h1>Record — Table-level Autoload Demo</h1>

	<div
		data-controller="record"
		data-record-table="people"
		data-record-autoload="true"
	>
		<!--<data data-record-filter="active" value="true"></data>-->
		<table class="simple-table" style="width:100%; border-collapse:collapse;">
			<thead>
				<tr><th>Name</th><th>Email</th><th>Actions</th></tr>
			</thead>
			<tbody>
				<!-- Template or existing rows may live here; controller will fire a record:ui:query with merged filters -->
					<tr data-record-id="">
						<td><input data-record-field="name" /></td>
						<td><input data-record-field="email" /></td>
						<td><button type="button" data-action="record#saveRecord">Save</button></td>
					</tr>
			</tbody>
		</table>
	</div>

	<!-- Event log to observe outgoing/incoming events -->
	<div
		data-controller="eventlog"
		data-eventlog-events="record:ui:query record:ui:loaded record:data:load record:data:add record:data:update"
		style="min-height:200px; background:white; border:1px solid #ddd; padding:10px;"
	></div>

	<script src="../js/stimulus.js"></script>
	<script src="../js/app.js"></script>

	<!-- Mock bridge/store for demos -->
	<script type="module" src="js/mock/mock-data-bridge.js"></script>

	<script type="module" src="js/controllers/record_controller.js"></script>
	<script type="module" src="../eventlog/js/controllers/eventlog_controller.js"></script>
</body>
</html>
